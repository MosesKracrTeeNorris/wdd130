<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD130 | HTML Form - User Poll</title>
    <link type="text/css" rel="stylesheet" href="poll-form.css" />
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Merriweather:wght@400;700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Red+Hat+Mono:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">   
</head>
<body>
<header>
    <h1>WDD130 | Moses Kracar-Tee Norris | HTML Form - User Poll</h1>
</header>
<main>
    <div class="form-item">
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname">
    </div>
    <div class="form-item column1">
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname">
    </div>
    <div class="form-item column2">
        <label for="useremail">Email Address:</label>
        <input type="email" id="useremail" name="useremail">
    </div>
<form>
    <fieldset>
        <legend>Contact Information</legend>
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname">
        <label for="useremail">Email Address:</label>
        <input type="email" id="useremail" name="useremail">
    </fieldset>
    <fieldset>
        <legend>Questions</legend>
        <label for="browser">What is your favorite internet browser?</label>
        <select id="browser" name="browser">
            <option value="chrome">Chrome</option>
            <option value="firefox">Firefox</option>
            <option value="safari">Safari</option>
            <option value="edge">Edge</option>
            <option value="brave">Brave</option>
            <option value="other">Other</option>
        </select>
        <label for="pet">Do you have a household pet?</label>
        <input type="checkbox" id="pet" name="pet">
        <label for="feedback">List the places you have lived:</label>
        <textarea id="feedback" name="feedback" rows="4" placeholder="Stillwater Florida, Amsterdam Netherlands, Tibuktu Mail"></textarea>
    </fieldset>
    <button type="submit">Submit Poll</button>
</form>
</main>
<footer>
    <p>&copy;2025 | HTML Form - User Poll Activity | Moses Kracar-Tee Norris </p>
</footer>
</body>
</html>
